kind = "web"
previewPath = "/"
title = "SmartFlow AI – Intelligent Traffic Flow Optimizer"
version = "1.0.0"
id = "artifacts/smartflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19158
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/smartflow run dev"

[services.env]
PORT = "19158"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/smartflow", "run", "build"]
publicDir = "artifacts/smartflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
